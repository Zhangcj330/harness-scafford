name: smoke

on:
  pull_request:

jobs:
  harness-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run python -m playwright install chromium
      - run: uv run python scripts/run_smoke.py --task examples/tasks/offline-smoke.yaml --resume-if-paused
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-runs
          path: .runs
